<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário para login</title>
    <link rel="shortcut icon" href="https://i.pinimg.com/1200x/8b/2d/1f/8b2d1f9cabda031ecfd38826d7f2a1b2.jpg" type="image/x-icon">
</head>
<body>
    <h1>Login MS Code</h1>
    <form action="#" method="post">
        <label for="email">Email: </label> 
        <input type="email" name="email" id="email" required>   
        
        <br>

        <label for="senha">Senha: </label>
        <input type="password" name="senha" id="senha" required minlength="6">

        <br>

        <input type="checkbox" name="aceito" id="aceito">
        <label for="aceito">Aceito os termos de uso. </label>

        <br>

        <button type="submit">Login</button>
    </form>
</body>
</html>
